<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Estimator</title>
    <style>
        :root {
            --bg-base: #f0fdf4;
            --bg-card: #ffffff;
            --text-main: #064e3b;
            --text-muted: #15803d;
            --accent: #059669;
            --accent-hover: #047857;
            --accent-light: #d1fae5;
            --border: #a7f3d0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
            --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg-base);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calc-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 540px;
            box-shadow: var(--shadow);
        }

        .calc-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .calc-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .calc-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 22px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .label-row span {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .input-box-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px;
        }

        .currency-symbol {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-right: 4px;
        }

        .input-manual {
            width: 90px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            text-align: right;
            outline: none;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .term-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.15s;
        }

        .toggle-btn.active {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .output-box {
            background-color: var(--accent-light);
            border: 1px solid rgba(5, 150, 105, 0.15);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }

        .output-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .output-val {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
            border-top: 1px solid rgba(5, 150, 105, 0.1);
            padding-top: 15px;
            font-size: 0.8rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .detail-lbl {
            color: var(--text-muted);
        }

        .detail-val {
            font-weight: 700;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="calc-card">
        <div class="calc-header">
            <h2>Mortgage Estimator</h2>
            <p>Estimate full monthly mortgage costs including taxes & insurance</p>
        </div>

        <!-- INPUT 1: HOME VALUE -->
        <div class="input-group">
            <div class="label-row">
                <span>Home Value</span>
                <div class="input-box-wrapper">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="home-manual" class="input-manual" value="350000" min="50000" max="2000000">
                </div>
            </div>
            <input type="range" id="home-slider" min="50000" max="2000000" step="10000" value="350000" oninput="syncInputs('home')">
        </div>

        <!-- INPUT 2: DOWN PAYMENT -->
        <div class="input-group">
            <div class="label-row">
                <span>Down Payment</span>
                <div class="input-box-wrapper">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="down-manual" class="input-manual" value="70000" min="0" max="500000">
                </div>
            </div>
            <input type="range" id="down-slider" min="0" max="500000" step="5000" value="70000" oninput="syncInputs('down')">
        </div>

        <!-- INPUT 3: INTEREST RATE -->
        <div class="input-group">
            <div class="label-row">
                <span>Interest Rate</span>
                <div class="input-box-wrapper">
                    <input type="number" id="rate-manual" class="input-manual" value="6.5" min="1" max="15" step="0.1">
                    <span class="currency-symbol" style="margin-left: 4px;">%</span>
                </div>
            </div>
            <input type="range" id="rate-slider" min="1" max="15" step="0.1" value="6.5" oninput="syncInputs('rate')">
        </div>

        <!-- LOAN TERM SWITCH -->
        <div class="term-toggle">
            <button class="toggle-btn active" id="term-30" onclick="setTerm(30)">30-Year Fixed</button>
            <button class="toggle-btn" id="term-15" onclick="setTerm(15)">15-Year Fixed</button>
        </div>

        <!-- OUTPUT RESULTS -->
        <div class="output-box">
            <div class="output-label">Estimated Monthly Payment</div>
            <div class="output-val" id="payment-val">$2,118</div>
            
            <div class="details-grid">
                <div class="detail-item">
                    <span class="detail-lbl">Principal & Interest</span>
                    <span class="detail-val" id="detail-pi">$1,770</span>
                </div>
                <div class="detail-item">
                    <span class="detail-lbl">Est. Taxes & Insurance</span>
                    <span class="detail-val" id="detail-tax-ins">$348</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const homeSlider = document.getElementById('home-slider');
        const homeManual = document.getElementById('home-manual');
        const downSlider = document.getElementById('down-slider');
        const downManual = document.getElementById('down-manual');
        const rateSlider = document.getElementById('rate-slider');
        const rateManual = document.getElementById('rate-manual');

        const paymentValueElement = document.getElementById('payment-val');
        const detailPiElement = document.getElementById('detail-pi');
        const detailTaxInsElement = document.getElementById('detail-tax-ins');

        let loanTermYears = 30;

        function syncInputs(type) {
            if (type === 'home') {
                homeManual.value = homeSlider.value;
            } else if (type === 'down') {
                downManual.value = downSlider.value;
            } else if (type === 'rate') {
                rateManual.value = rateSlider.value;
            }
            calculateMortgage();
        }

        homeManual.addEventListener('input', () => {
            homeSlider.value = homeManual.value;
            calculateMortgage();
        });
        downManual.addEventListener('input', () => {
            downSlider.value = downManual.value;
            calculateMortgage();
        });
        rateManual.addEventListener('input', () => {
            rateSlider.value = rateManual.value;
            calculateMortgage();
        });

        function setTerm(years) {
            loanTermYears = years;
            document.getElementById('term-30').classList.toggle('active', years === 30);
            document.getElementById('term-15').classList.toggle('active', years === 15);
            calculateMortgage();
        }

        function calculateMortgage() {
            const home = parseFloat(homeManual.value) || 0;
            const down = parseFloat(downManual.value) || 0;
            const annualRate = (parseFloat(rateManual.value) || 0) / 100;

            const principal = home - down;

            if (principal <= 0) {
                paymentValueElement.textContent = '$0';
                detailPiElement.textContent = '$0';
                detailTaxInsElement.textContent = '$0';
                return;
            }

            // 1. Calculate Principal and Interest (P&I)
            const monthlyRate = annualRate / 12;
            const totalPayments = loanTermYears * 12;
            let monthlyPI = 0;

            if (monthlyRate > 0) {
                monthlyPI = principal * (monthlyRate * Math.pow(1 + monthlyRate, totalPayments)) / (Math.pow(1 + monthlyRate, totalPayments) - 1);
            } else {
                monthlyPI = principal / totalPayments;
            }

            // 2. Real-world Taxes & Insurance Estimates (T&I)
            // Assumes annual property tax is 1.2% of home value
            // Assumes annual home insurance is 0.35% of home value
            const monthlyTaxes = (home * 0.012) / 12;
            const monthlyInsurance = (home * 0.0035) / 12;
            const monthlyTI = monthlyTaxes + monthlyInsurance;

            const totalMonthlyPayment = monthlyPI + monthlyTI;

            // Render output values
            detailPiElement.textContent = '$' + Math.round(monthlyPI).toLocaleString();
            detailTaxInsElement.textContent = '$' + Math.round(monthlyTI).toLocaleString();
            paymentValueElement.textContent = '$' + Math.round(totalMonthlyPayment).toLocaleString();
        }

        // Initial Calculation
        calculateMortgage();
    </script>
</body>
</html>
